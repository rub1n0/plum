<script type="text/javascript">
var g_ButtonClickCount = 1;

var mismatchAlert = "The 'Web Password' and 'Confirm Password' values are different. They must match.";
var invalidWebPassAlert = "Invalid password, please enter valid password. An ASCII string 1-20 characters long.";
var invalidConfirmPassAlert = "Invalid password, please enter valid password. An ASCII string 1-20 characters long.";
var invalidChallengeResAlert = "Invalid Challenge Response, please enter an Alphanumeric character string 1-255 characters long.";
var invalidChallengeQuesAlert = "Invalid Challenge Question, please enter an Ascii character string 1-255 characters long.";

var asciiPattern = "^[\\x21-\\x7E]";
var asciiWithSpacesPattern = "^[\\x20-\\x7E]";
var alphaNumPattern = "^[a-zA-Z\\d]";

function setValues(frm)
{
	 frm.webUser.value = webUser;
	 frm.challengeQues.value = challengeQues;
	 frm.challengeRes.value = challengeRes;
}

function formReset(frm)
{
	frm.reset();
	onFormLoad(frm);
}

function getCookie(name)
{
	var nameEQ = name + "=";
    var ca = document.cookie.split(';');
    for(var i=0;i < ca.length;i++) {
        var c = ca[i];
        while (c.charAt(0)==' ') c = c.substring(1,c.length);
        if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
    }
    return "";
}

function onFormLoad(frm)
{
   g_ButtonClickCount = 1;
   setValues(frm);	
   g_ButtonClickCount = 0;
   if(isDefaultSession())
   {
	   setButtonDisabled(true);
	   document.getElementById("cmdFinish").disabled = false;
   }
   else
   {
   	   setButtonDisabled( false );
   }
}

function isDefaultSession()
{
	return (getCookie('SessionType') == "DEFAULT" || getCookie('SessionType') == "");
}

function isPasswordFieldValid ( frm, notEmpty )
{
   return arePasswordsValid(frm.webPass.value, frm.confirmPass.value, notEmpty);
}

function areReqdFieldsValid( frm, notEmpty )
{
	return isChallengeResValid(frm.challengeRes.value, notEmpty) && isChallengeQuesValid(frm.challengeQues.value, notEmpty);
}

function isFormValid ( frm )
{
   var valid = isPasswordFieldValid(frm, isDefaultSession()) && areReqdFieldsValid(frm, false);
   return valid;
}

function onButtonClick(arg)
{
   if ( g_ButtonClickCount == 0 && isFormValid ( document.FormAdmin ) )
   {
      g_ButtonClickCount++;
      setButtonDisabled( true );

      document.FormAdmin.NextPage.value = arg;
      document.FormAdmin.submit();
   }
}
function setButtonDisabled(bValue)
{
   id = document.getElementById("cmdPrev"); if ( id ) { id.disabled = bValue; }
   id = document.getElementById("cmdNext"); if ( id ) { id.disabled = bValue; }
   id = document.getElementById("cmdReset"); if ( id ) { id.disabled = bValue; }
   id = document.getElementById("cmdFinish"); if ( id ) { id.disabled = bValue; }
}

function handleMenuClick(arg)
{
	if(isDefaultSession())
	   {
		   return false;
	   }
	   else
	   {
	   	  onButtonClick(arg);
	   }
}

function arePasswordsValid(inputPass, confirmPass, notEmpty)
{
	if(!isPasswordValid(inputPass, notEmpty))
	{
		alert(invalidWebPassAlert);
		return false;
	}
	if(!isPasswordValid(confirmPass, notEmpty))
	{
		alert(invalidConfirmPassAlert);
		return false;
	}
	if(inputPass!=confirmPass)
	{
		alert(mismatchAlert);
		return false;
	}
	return true;
}

function isAscii(inputStr, notEmpty, includeSpaces)
{	
	var patternStr = (includeSpaces)? asciiWithSpacesPattern : asciiPattern;
	pattern = (notEmpty)? new RegExp(patternStr+"+$") : new RegExp(patternStr+"*$");
	return pattern.test(inputStr);
}

function isAlphaNumeric(txt, notEmpty)
{
	var pattern = (notEmpty)? new RegExp(alphaNumPattern+"+$") : new RegExp(alphaNumPattern+"*$");
	return pattern.test(txt);
}

function isPasswordValid(inputPass, notEmpty)
{
  return isAscii(inputPass, notEmpty, false) && inputPass.length <= 20;
}

function isChallengeQuesValid(inputQues, notEmpty)
{
  var valid = isAscii(inputQues, notEmpty, true) && inputQues.length <= 255;
  if(!valid)
  {
	  alert(invalidChallengeQuesAlert);
  }
  return valid;
}

function isChallengeResValid(inputRes, notEmpty)
{
  var valid = isAlphaNumeric(inputRes, notEmpty) && inputRes.length <= 255;
  if(!valid)
  {
	  alert(invalidChallengeResAlert);
  }
  return valid;
}
