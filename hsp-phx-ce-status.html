function getDeviceText()
{
	if (deviceName == "")
	{
		deviceName = "(Not available)";
	}
	if (deviceType == "")
	{
		deviceType = "(Not available)";
	}
	
	return " DEVICE:\n" +

		"   Device Type:           " + deviceType + "\n" +
		"   Device System Version: " + ceSystemVersion + "\n" + 
		"   CE App Version:        " + ceAppVersion + "\n" + 
		"   CE OS Version:         " + ceOsVersion + "\n";
}

function getEthernetText()
{
	var text =  " ETHERNET:\n";
	
	if (ethernetIpAddress == "")
	{
		text += "   (Interface is down)\n";
	}
	else
	{
		text +=	"   IP Address:           " + ethernetIpAddress + "\n" +
				"   Subnet Mask:          " + ethernetSubnetMask + "\n" +
				"   MAC Address:          " + ethernetMacAddress + "\n";
	}
	
	return text;
}

function getWirelessText()
{
	var text =  " WIRELESS LAN:\n";
	
	if (wirelessIpAddress == "")
	{
		text += "   (Interface is down)\n"
	}
	else
	{
		text +=	"   IP Address:           " + wirelessIpAddress + "\n" +
				"   Subnet Mask:          " + wirelessSubnetMask + "\n" +
				"   MAC Address:          " + wirelessMacAddress + "\n" +
				"   SSID:                 " + ssid + "\n" +
				"   BSSID:                " + bssid + "\n" +
				"   Frequency Band:       " + frequencyBand + "\n" +
				"   Current Channel:      " + currentChannel + "\n" +
				"   Signal Level:         " + signalLevel + " dBm\n" +
				"   Transmit Power:       " + transmitLevel + " dBm\n" +
				"   Region Code:          " + globalRegion + "\n";
	}
	
	return text;
}

function getHmssText()
{
	if (hmssIpAddress == "")
	{
		hmssIpAddress = "(The HMSS is not properly configured)";
	}
	if (hmssConnected == "")
	{
		hmssConnected = "(Status is not available)";
	}
	
	return " HMSS:\n" +
	       "   Host/IP-Address:      " + hmssIpAddress + "\n" +
		   "   Status:               " + hmssConnected + "\n";
}

function getPumpText()
{
 	var text = " PUMP:\n";
	if(plumAPlus != "")
	{
		text += "   Status:               " + plumAPlus + "\n\t" + plumAPlusDeviceManifest + "\n";
	}
	else if(plumTriple1 != "" || plumTriple2 != "" || plumTriple3 != "")
	{
		if(plumTriple1 == "")
		{
			text += "   Infuser 0 Status:     Not Available\n";
		}	
		else
		{
			text += "   Infuser 0 Status:     " + plumTriple1 + "\n\t" + plumTripleDeviceManifest1 + "\n\n";
		}
		
		if(plumTriple2 == "")
		{
			text += "   Infuser 1 Status:     Not Available\n";
		}
		else
		{
			text += "   Infuser 1 Status:     " + plumTriple2 + "\n\t" + plumTripleDeviceManifest2 + "\n\n";
		}
		
		if(plumTriple3 == "")
		{
			text += "   Infuser 2 Status:     Not Available\n";
		}
		else
		{
			text += "   Infuser 2 Status:     " + plumTriple3 + "\n\t" + plumTripleDeviceManifest3 + "\n";
		}
	}
	else
	{
		text += "   Status:               Not Available\n";
	}
	
	return text;
}

function onFormStatusLoad(frm)
{
	var text = 
			getDeviceText() +
			getEthernetText() +
			getWirelessText() +
			getHmssText() +
			getPumpText();

	frm.networkStatus.value = text;
}

var g_ButtonClickCount = 0;
function onButtonClick(arg)
{
	if ( g_ButtonClickCount++ == 0 )
	{
		document.FormStatus.NextPage.value = arg
		id = document.getElementById("cmdNext"); if ( id ) { id.disabled = true; }
		id = document.getElementById("cmdRefresh"); if ( id ) { id.disabled = true; }
		document.FormStatus.submit()
	}
	
}
